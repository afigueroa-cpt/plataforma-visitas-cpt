const parseDateStr=d=>{
  if(!d)return null;
  const s=String(d).trim();
  if(!s)return null;
  // Formato DD/MM/AAAA o D/M/AAAA
  if(s.indexOf('/')>-1){
    const p=s.split('/');
    if(p.length!==3)return null;
    const dd=parseInt(p[0]),mm=parseInt(p[1]),yy=parseInt(p[2]);
    if(isNaN(dd)||isNaN(mm)||isNaN(yy))return null;
    return new Date(yy,mm-1,dd);
  }
  // Formato ISO YYYY-MM-DD (Airtable date field)
  if(s.indexOf('-')>-1){
    const p=s.split('-');
    if(p.length>=3){
      const yy=parseInt(p[0]),mm=parseInt(p[1]),dd=parseInt(p[2].substring(0,2));
      if(!isNaN(yy)&&!isNaN(mm)&&!isNaN(dd))return new Date(yy,mm-1,dd);
    }
  }
  // Fallback parseo nativo
  const n=new Date(s);
  if(!isNaN(n.getTime()))return n;
  return null;
};

/* Fidelidad: verifica que se visitó el mismo recinto planificado (usa recintoPlan si existe, sino asume fiel) */
const isFiel=v=>{if(v.origen!=='Planificada')return false;const rPlan=(v.recintoPlan||v.recinto||'').trim().toLowerCase();const rReal=(v.recinto||'').trim().toLowerCase();return rPlan===rReal;};
/* Variación: verifica diferencias operativas (mes, duración, participantes) */
const hasVariacion=v=>{if(v.origen!=='Planificada')return false;return v.mesPlan!==v.mesReal||v.diasTotalPlan!==v.diasTotalReal||(v.totalParticipantesPlan!=null&&v.totalParticipantesReal!=null&&v.totalParticipantesPlan!==v.totalParticipantesReal);};
/* Legacy alias — hasDesviacion ahora combina ambos criterios para estado efectivo */
const hasDesviacion=v=>!isFiel(v)||hasVariacion(v);
const computeEstadoEfectivo=v=>{if(v.estado==='Realizada'&&v.origen==='Planificada'&&hasDesviacion(v))return 'Modificada';return v.estado;};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

const getYear=v=>{const d=parseDateStr(v.fechaVisita);return d?d.getFullYear():null;};

const computeLastUpdate=(data)=>{
  let latest=null;
  data.forEach(v=>{const d=parseDateStr(v.fechaVisita);if(d&&(!latest||d>latest))latest=d;});
  if(!latest)return 'Sin fecha';
  return latest.toLocaleDateString('es-CL',{year:'numeric',month:'long',day:'numeric'});
};

// ═══ Configuración Proxy Cloudflare (sin token expuesto) ═══
const AIRTABLE_CONFIG = {
  proxyUrl: 'https://proxy-cpt-airtable.afigueroa.workers.dev'
};

const Airtable = {
  async listAll(tableKey) {
    try {
      const r = await fetch(`${AIRTABLE_CONFIG.proxyUrl}/list?table=${tableKey}`);
      if (!r.ok) return {ok:false, error:'HTTP '+r.status};
      return await r.json();
    } catch(e) { return {ok:false, error:String(e)}; }
  },
  async update(tableKey, recordId, fields) {
    try {
      const cleanFields = {};
      for (const [k,v] of Object.entries(fields)) {
        if (k === '_recordId') continue;
        if (v !== undefined && v !== null && v !== '') cleanFields[k] = v;
      }
      const r = await fetch(`${AIRTABLE_CONFIG.proxyUrl}/update?table=${tableKey}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({recordId, fields: cleanFields})
      });
      if (!r.ok) { const err = await r.text(); return {ok:false, error:err}; }
      const d = await r.json();
      return {ok:true, data:{...d.fields, _recordId:d.id}};
    } catch(e) { return {ok:false, error:String(e)}; }
  },
  async create(tableKey, fields) {
    try {
      const cleanFields = {};
      for (const [k,v] of Object.entries(fields)) {
        if (k === '_recordId') continue;
        if (v !== undefined && v !== null && v !== '') cleanFields[k] = v;
      }
      const r = await fetch(`${AIRTABLE_CONFIG.proxyUrl}/create?table=${tableKey}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({fields: cleanFields})
      });
      if (!r.ok) { const err = await r.text(); return {ok:false, error:err}; }
      const d = await r.json();
      return {ok:true, data:{...d.fields, _recordId:d.id}};
    } catch(e) { return {ok:false, error:String(e)}; }
  }
};

    const av=planVisits.filter(v=>v.areaEje===area&&v.origen==='Planificada'&&v.estado==='Realizada'&&v.diasTotalPlan>0);
    const pp=av.length>0?+(av.reduce((s,v)=>s+v.diasTotalPlan,0)/av.length).toFixed(1):0;
    const pr=av.length>0?+(av.reduce((s,v)=>s+v.diasTotalReal,0)/av.length).toFixed(1):0;
    return {area:area.length>16?area.substring(0,14)+'…':area,'Días Plan':pp,'Días Real':pr};
  }),[planVisits]);

  const segResumen=useMemo(()=>{
    const tiposRecinto=[...new Set(realizadas.map(v=>v.tipoRecinto).filter(Boolean))].sort();
    const hasSinClasificar=realizadas.some(v=>!v.tipoRecinto||!v.tipoRecinto.trim());
    const byTR=[...tiposRecinto.map(t=>({name:t,total:realizadas.filter(v=>v.tipoRecinto===t).length,visits:realizadas.filter(v=>v.tipoRecinto===t)})).filter(x=>x.total>0),...(hasSinClasificar?[{name:'Sin clasificar',total:realizadas.filter(v=>!v.tipoRecinto||!v.tipoRecinto.trim()).length,visits:realizadas.filter(v=>!v.tipoRecinto||!v.tipoRecinto.trim())}].filter(x=>x.total>0):[])].sort((a,b)=>b.total-a.total);
    const byMes=CAT.meses.map(m=>({name:m,short:m.slice(0,3),total:realizadas.filter(v=>v.mesReal===m).length,visits:realizadas.filter(v=>v.mesReal===m)}));
    const byReg=CAT.regiones.map(r=>({name:r,total:realizadas.filter(v=>v.region===r).length,visits:realizadas.filter(v=>v.region===r)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
    return {byTR,byMes,byReg};

  /* ═══ Registro Histórico uses visits (from Matriz Consolidada) ═══ */
  const histYears=useMemo(()=>{
    const yrs=new Set();
    visits.forEach(v=>{const y=getYear(v);if(y)yrs.add(y);});
    return [...yrs].sort();
  },[visits]);

  const histFiltered=useMemo(()=>{
    if(!histYearFilter)return visits;
    return visits.filter(v=>getYear(v)===Number(histYearFilter));
  },[visits,histYearFilter]);

  const histStats=useMemo(()=>{
    const src=histFiltered;
    const total=src.length;
    const programadas=src.filter(v=>v.origen==='Planificada').length;
    const noProgramadas=src.filter(v=>v.origen==='No Planificada').length;
    const informes=src.filter(v=>v.link);
    const byYear=histYears.map(y=>({name:String(y),short:String(y),total:visits.filter(v=>getYear(v)===y).length,visits:visits.filter(v=>getYear(v)===y)}));
    const byMes=CAT.meses.map(m=>({name:m,short:m.slice(0,3),total:src.filter(v=>(v.mesReal||v.mesPlan)===m).length,visits:src.filter(v=>(v.mesReal||v.mesPlan)===m)}));
    const tiposRecinto=[...new Set(src.map(v=>v.tipoRecinto).filter(Boolean))].sort();
    const hasSinClasificar=src.some(v=>!v.tipoRecinto||!v.tipoRecinto.trim());
    const byTR=[...tiposRecinto.map(t=>({name:t,total:src.filter(v=>v.tipoRecinto===t).length,visits:src.filter(v=>v.tipoRecinto===t)})).filter(x=>x.total>0),...(hasSinClasificar?[{name:'Sin clasificar',total:src.filter(v=>!v.tipoRecinto||!v.tipoRecinto.trim()).length,visits:src.filter(v=>!v.tipoRecinto||!v.tipoRecinto.trim())}].filter(x=>x.total>0):[])].sort((a,b)=>b.total-a.total);
    const byArea=CAT.areas.map(a=>({name:a,total:src.filter(v=>v.areaEje===a).length,visits:src.filter(v=>v.areaEje===a)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
    return {total,programadas,noProgramadas,informes,byYear,byMes,byTR,byArea};
  },[histFiltered,visits,histYears,histYearFilter]);

  const filteredVisits=useMemo(()=>{
    let r=planVisits.filter(v=>{
      if(filterArea&&v.areaEje!==filterArea)return false;
      if(filterEstado&&computeEstadoEfectivo(v)!==filterEstado)return false;
      if(filterOrigen&&v.origen!==filterOrigen)return false;
      if(searchTerm){const s=searchTerm.toLowerCase();return (v.recinto||'').toLowerCase().includes(s)||(v.id||'').toLowerCase().includes(s)||(v.expertoEncargado||'').toLowerCase().includes(s)||(v.region||'').toLowerCase().includes(s);}
      return true;
    });
    r.sort((a,b)=>{let va=a[sortField]||'',vb=b[sortField]||'';if(typeof va==='number'&&typeof vb==='number')return sortDir==='asc'?va-vb:vb-va;return sortDir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));});
    return r;
  },[planVisits,filterArea,filterEstado,filterOrigen,searchTerm,sortField,sortDir]);

  const toggleSort=f=>{if(sortField===f)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortField(f);setSortDir('asc');}};

      setShowPwdPrompt(false);

  const startEdit=v=>{

      tipoRecinto:v.tipoRecinto||'',
      expertoEncargado:v.expertoEncargado||'',
      analistaEncargado:v.analistaEncargado||'',

  const saveEdit=async id=>{
    if(!editUnlocked){setShowPwdPrompt(true);return;}
    const o=planVisits.find(v=>v.id===id);if(!o)return;
    if(editForm.estado==='Realizada'&&!editForm.fechaVisita){showToast('Ingrese fecha real','err');return;}

    if((editForm.estado==='Suspendida'||editForm.estado==='Reprogramada')&&!(editForm.justificacionDesviacion||'').trim()){showToast('Ingrese justificación','err');return;}
    setSyncingAT(true);
    const isReprg=editForm.estado==='Reprogramada';
    // Excluir 'nuevaFecha' — no existe como columna en Airtable
    const {nuevaFecha:_nf,...editFormClean}=editForm;
    // Solo campos que existen en tblPlan de Airtable
    const fieldsToSave=isReprg?{
      estado:'Reprogramada',
      fechaVisita:editForm.nuevaFecha,
      areaEje:editForm.areaEje||'',
      region:editForm.region||'',
      recinto:editForm.recinto||'',
      tipoVisita:editForm.tipoVisita||'',
      tipoRecinto:editForm.tipoRecinto||'',
      expertoEncargado:editForm.expertoEncargado||'',
      tema:o.tema||'',
    }:{
      // Solo campos que existen en tblPlan — tipos estrictos para Airtable
      estado:editFormClean.estado,
      areaEje:editFormClean.areaEje||'',
      recinto:editFormClean.recinto||'',
      region:editFormClean.region||'',
      tipoVisita:editFormClean.tipoVisita||'',
      tipoRecinto:editFormClean.tipoRecinto||'',
      expertoEncargado:editFormClean.expertoEncargado||'',
      analistaEncargado:editFormClean.analistaEncargado||'',
      equipoReal:editFormClean.equipoReal||'',
      fechaVisita:editFormClean.fechaVisita||'',
      mesReal:editFormClean.mesReal||'',
      diasTotalReal:parseFloat(editFormClean.diasTotalReal)||0,
      totalParticipantesReal:parseInt(editFormClean.totalParticipantesReal)||0,
      tema:editFormClean.tema||'',
    };
    const updated={...o,...fieldsToSave};
    if(o._recordId){
      const res=await Airtable.update('plan', o._recordId, fieldsToSave);
      setSyncingAT(false);
      if(res.ok){
        setPlanVisits(p=>p.map(v=>v.id===id?{...updated,_recordId:o._recordId}:v));
        showToast('✓ Guardado en Airtable');
        setEditingId(null);
      } else {
        showToast('Error: '+(res.error||'').substring(0,80),'err');
      }
    } else {
      setSyncingAT(false);
      setPlanVisits(p=>p.map(v=>v.id===id?updated:v));
      showToast('Visita actualizada (solo local)','warn');
      setEditingId(null);
    }
  };
  const cancelEdit=()=>{setEditingId(null);setEditForm({});};

  const openRegNoPlan=()=>{

    if(!editUnlocked){setShowPwdPrompt(true);return;}
    if(!regForm.recinto||!regForm.areaEje||!regForm.region){showToast('Complete: Recinto, Área y Región','err');return;}
    if(regMode==='noPlanificada'){
      if(!regForm.fechaVisita){showToast('Ingrese fecha','err');return;}
      const newVisit={...regForm,id:'V'+uid().toUpperCase().slice(0,5)};
      setSyncingAT(true);
      const res=await Airtable.create('visitas', newVisit);
      setSyncingAT(false);
      if(res.ok){
        setVisits(p=>[...p,res.data]);
        showToast('✓ Registrada en Airtable');
      } else {
        setVisits(p=>[...p,newVisit]);
        showToast('Guardada localmente. Error API: '+(res.error||'').substring(0,60),'warn');
      }
    }else{
      showToast('Planificación actualizada');
    }
    setShowRegForm(false);setRegForm({...EMPTY_FORM});setRegEditId(null);
  };

  const Badge=({estado})=>{const s=ST[estado]||ST.Programada;return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:20,fontSize:9,fontWeight:700,textTransform:'uppercase',background:s.bg,color:s.text,fontFamily:font}}><span style={{width:6,height:6,borderRadius:'50%',background:s.dot}}/>{estado}</span>;};

  const inputStyle={width:'100%',padding:'8px 10px',border:`1px solid ${C.grayLight}`,borderRadius:8,fontSize:12,fontFamily:font,color:C.text,background:'#fff'};

      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:5}}>
        <div style={{width:26,height:26,borderRadius:7,background:`${accent||C.accent}15`,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon size={13} color={accent||C.accent}/></div>
        <span style={{fontSize:8,fontWeight:700,color:C.gray,textTransform:'uppercase',letterSpacing:'0.04em',flex:1,lineHeight:1.2}}>{label}</span>
        <ChevronDown size={10} color={C.gray} style={{transform:isA?'rotate(180deg)':'none',transition:'transform 0.2s'}}/>
      </div>
      <div style={{fontSize:22,fontWeight:800,color:color||C.text,lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:9,color:C.gray,marginTop:3}}>{sub}</div>}
      {isH&&tipKey&&KPI_TIPS[tipKey]&&<div style={{position:'absolute',bottom:'100%',left:0,right:0,marginBottom:6,padding:'8px 12px',background:C.navyDeep,color:'#fff',borderRadius:8,fontSize:10,lineHeight:1.4,fontWeight:400,zIndex:10,boxShadow:'0 4px 16px rgba(0,0,0,0.25)',pointerEvents:'none'}}>
        {KPI_TIPS[tipKey]}

  const BreakdownPanel=({data,color,label})=>(
    <div style={{background:'#FFFAF0',border:`1px solid ${C.accentLight}`,borderRadius:10,padding:14,marginBottom:12,animation:'fadeIn 0.3s'}}>
      <div style={{fontSize:10,fontWeight:700,color:C.badgeText,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:10}}>Desglose: {label} — {data.total} visita{data.total!==1?'s':''}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div>
          <div style={{fontSize:9,fontWeight:700,color:C.gray,textTransform:'uppercase',marginBottom:6}}><Building2 size={9} style={{verticalAlign:'middle',marginRight:3}}/>Por Tipo de Recinto</div>
          {data.byRecinto.map((r,i)=>(
            <div key={i} onClick={()=>setDrillRecinto(drillRecinto===r.name?null:r.name)}
              style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'4px 5px',borderBottom:`1px solid ${C.creamDark}`,cursor:'pointer',borderRadius:4,background:drillRecinto===r.name?'#FEF3D8':'transparent',transition:'background 0.15s'}}
              onMouseOver={e=>{if(drillRecinto!==r.name)e.currentTarget.style.background=C.cream;}} onMouseOut={e=>{if(drillRecinto!==r.name)e.currentTarget.style.background='transparent';}}>
              <span style={{fontWeight:600,maxWidth:250,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:3}}>
                {drillRecinto===r.name?<ChevronDown size={9} color={color}/>:<ChevronRight size={9} color={C.gray}/>}{r.name}
              </span>

                style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1,cursor:d.total>0?'pointer':'default'}}>

      })()}

  );

  const ClickableBarRow=({item,maxVal,color,onClick,isActive})=>(
    <div onClick={onClick} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,cursor:'pointer',padding:'3px 5px',borderRadius:5,background:isActive?'#FEF3D8':'transparent',transition:'background 0.12s'}}
      onMouseOver={e=>{if(!isActive)e.currentTarget.style.background=C.cream;}} onMouseOut={e=>{if(!isActive)e.currentTarget.style.background='transparent';}}>

  return (
    <div style={{fontFamily:font,background:C.cream,minHeight:'100vh',color:C.text}}>
      {syncingAT&&<div style={{position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',zIndex:9998,padding:'8px 18px',borderRadius:20,fontSize:11,fontWeight:700,background:C.navyDeep,color:C.accentLight,boxShadow:'0 4px 16px rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:12,height:12,border:`2px solid ${C.accentLight}`,borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>

      <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>

          {pwdError&&<div style={{fontSize:11,color:'#DC3545',marginBottom:8}}>⚠ {pwdError}</div>}
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
            <button onClick={()=>{setShowPwdPrompt(false);setPwdInput('');setPwdError('');}} style={{padding:'8px 14px',background:'#fff',border:`1px solid ${C.grayLight}`,borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:font,color:C.text}}>Cancelar</button>

                <button key={tab.id} onClick={()=>{setActiveTab(tab.id);setEditingId(null);setActiveKpi(null);setDrillRecinto(null);setHistDrill(null);}}
                  style={{padding:'6px 12px',borderRadius:7,border:'none',cursor:'pointer',fontSize:10,fontWeight:700,fontFamily:font,background:activeTab===tab.id?`linear-gradient(135deg,${C.accent},${C.accentDark})`:'transparent',color:activeTab===tab.id?'#fff':'rgba(255,255,255,0.6)',display:'flex',alignItems:'center',gap:4}}>
                  <tab.icon size={11}/>{tab.label}
                </button>
              ))}
            </div>
            <button onClick={openRegNoPlan} style={{padding:'6px 12px',borderRadius:7,border:'1px solid rgba(255,255,255,0.2)',background:'rgba(255,255,255,0.08)',color:C.accentLight,cursor:'pointer',fontSize:10,fontWeight:700,fontFamily:font,display:'flex',alignItems:'center',gap:3,marginLeft:4}}><Plus size={11}/>Registrar</button>
            {editUnlocked?
              <button onClick={lockEdit} title="Edición habilitada - clic para bloquear" style={{padding:'6px 10px',borderRadius:7,border:'1px solid rgba(255,255,255,0.2)',background:'rgba(40,160,90,0.2)',color:'#5EC88A',cursor:'pointer',fontSize:10,fontWeight:700,fontFamily:font,display:'flex',alignItems:'center',gap:3,marginLeft:4}}>🔓 Edición</button>
              :
              <button onClick={()=>setShowPwdPrompt(true)} title="Edición bloqueada - clic para desbloquear" style={{padding:'6px 10px',borderRadius:7,border:'1px solid rgba(255,255,255,0.2)',background:'rgba(255,255,255,0.05)',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:10,fontWeight:700,fontFamily:font,display:'flex',alignItems:'center',gap:3,marginLeft:4}}>🔒 Solo lectura</button>
            }
          </div>
        </div>
      </header>

      {/* REG PANEL */}
      {showRegForm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(13,31,71,0.5)',zIndex:998,display:'flex',justifyContent:'flex-end',backdropFilter:'blur(3px)'}} onClick={()=>setShowRegForm(false)}>
          <div style={{width:500,maxWidth:'95vw',background:'#fff',height:'100%',overflow:'auto',boxShadow:'-8px 0 32px rgba(13,31,71,0.25)',animation:'slideRight 0.25s ease'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:`linear-gradient(135deg,${C.navyDeep},${C.blueDark})`,padding:'14px 20px',borderBottom:`3px solid ${C.accentLight}`,position:'sticky',top:0,zIndex:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div><div style={{fontSize:9,fontWeight:700,color:C.accentLight,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:2}}>{regMode==='noPlanificada'?'Nueva visita':'Modificar planificación'}</div>
                <div style={{fontSize:14,fontWeight:800,color:'#fff'}}>{regMode==='noPlanificada'?'Registrar Visita No Planificada':`Editar — ${regEditId||''}`}</div></div>
                <button onClick={()=>setShowRegForm(false)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',fontSize:18,cursor:'pointer'}}>✕</button>
              </div>
            </div>
            <div style={{padding:'16px 20px'}}>
              {(regMode==='noPlanificada'||regEditId)&&(
                <>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                    <div><label style={labelStyle}>Área/Eje *</label><select value={regForm.areaEje} onChange={e=>setRegForm({...regForm,areaEje:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.areas.map(a=><option key={a}>{a}</option>)}</select></div>
                    <div><label style={labelStyle}>Región *</label><select value={regForm.region} onChange={e=>setRegForm({...regForm,region:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.regiones.map(r=><option key={r}>{r}</option>)}</select></div>
                  </div>
                  <div style={{marginBottom:8}}><label style={labelStyle}>Recinto *</label><input value={regForm.recinto} onChange={e=>setRegForm({...regForm,recinto:e.target.value})} style={inputStyle}/></div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:8}}>
                    <div><label style={labelStyle}>Tipo Visita</label><select value={regForm.tipoVisita} onChange={e=>setRegForm({...regForm,tipoVisita:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.tiposVisita.map(t=><option key={t}>{t}</option>)}</select></div>
                    <div><label style={labelStyle}>Fecha</label><input value={regForm.fechaVisita} onChange={e=>setRegForm({...regForm,fechaVisita:e.target.value})} placeholder="DD/MM/AAAA" style={inputStyle}/></div>
                    <div><label style={labelStyle}>Mes Real</label><select value={regForm.mesReal} onChange={e=>setRegForm({...regForm,mesReal:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.meses.map(m=><option key={m}>{m}</option>)}</select></div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                    <div><label style={labelStyle}>Encargado/a</label><select value={regForm.expertoEncargado} onChange={e=>setRegForm({...regForm,expertoEncargado:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.encargados.map(e=><option key={e}>{e}</option>)}</select></div>
                    <div><label style={labelStyle}>Comuna</label><input value={regForm.comuna} onChange={e=>setRegForm({...regForm,comuna:e.target.value})} style={inputStyle}/></div>
                  </div>
                  <div style={{marginBottom:8}}><label style={labelStyle}>Objetivo / Tema</label><textarea value={regForm.tema} onChange={e=>setRegForm({...regForm,tema:e.target.value})} rows={2} style={{...inputStyle,resize:'vertical'}}/></div>
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
                    <button onClick={()=>setShowRegForm(false)} style={{padding:'8px 16px',background:'#fff',border:`1px solid ${C.grayLight}`,borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:font,color:C.text}}>Cancelar</button>
                    <button onClick={submitReg} style={{padding:'8px 16px',background:`linear-gradient(135deg,${C.accent},${C.accentDark})`,color:'#fff',border:'none',borderRadius:8,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:font}}>Guardar</button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}

      <main style={{maxWidth:1440,margin:'0 auto',padding:'18px 16px'}}>

        {/* ═══ VISTA A: SEGUIMIENTO PLANIFICACIÓN 2025 ═══ */}
        {activeTab==='planificacion'&&(<div>
          <div style={{background:'#fff',borderRadius:10,border:`1px solid ${C.grayLight}`,padding:'9px 16px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}><Clock size={13} color={C.accent}/><span style={{fontSize:10,fontWeight:700,color:C.gray,textTransform:'uppercase'}}>Fecha de seguimiento</span><span style={{fontSize:12,fontWeight:800,color:C.text}}>{new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span></div>
            {(()=>{const hoy=new Date();const pend=planVisits.filter(v=>isPendienteConfirmacion(v,hoy));return pend.length>0&&(
              <button onClick={()=>{if(!editUnlocked){setShowPwdPrompt(true);return;}setShowPorConfirmar(v=>!v);}}
                style={{padding:'6px 12px',background:showPorConfirmar?`linear-gradient(135deg,#9B1C1C,#7A1515)`:`linear-gradient(135deg,#DC3545,#9B1C1C)`,color:'#fff',border:'none',borderRadius:7,fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:font,display:'flex',alignItems:'center',gap:4}}>
                <span style={{background:'rgba(255,255,255,0.25)',borderRadius:'50%',width:16,height:16,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800}}>{pend.length}</span>
                Por confirmar
              </button>
            );})()}
            <button onClick={()=>{if(!editUnlocked){setShowPwdPrompt(true);return;}openRegNoPlan();}} style={{padding:'6px 12px',background:`linear-gradient(135deg,${C.accent},${C.accentDark})`,color:'#fff',border:'none',borderRadius:7,fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:font,display:'flex',alignItems:'center',gap:3}}><Plus size={11}/>Registrar</button>
          </div>
          <div style={{marginBottom:12}}><h2 style={{fontSize:17,fontWeight:800,margin:0}}>Seguimiento Planificación 2025</h2>

          {/* ══ PANEL POR CONFIRMAR ══ */}
          {showPorConfirmar&&!confirmId&&(()=>{
            const hoy=new Date();
            const pend=planVisits.filter(v=>isPendienteConfirmacion(v,hoy)).sort((a,b)=>{
              const da=parseDateStr(a.fechaVisita),db=parseDateStr(b.fechaVisita);
              if(!da&&!db)return(MESES_IDX[a.mesPlan]??99)-(MESES_IDX[b.mesPlan]??99);
              if(!da)return 1;if(!db)return -1;return da-db;
            });
            return(
              <div style={{background:'#fff',borderRadius:12,border:'2px solid #DC3545',marginBottom:16,overflow:'hidden'}}>
                <div style={{background:'linear-gradient(135deg,#9B1C1C,#7A1515)',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontSize:9,fontWeight:700,color:'#FCA5A5',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:2}}>Requieren confirmación</div>
                    <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{pend.length} visita{pend.length!==1?'s':''} con fecha vencida sin confirmar</div>
                  </div>
                  <button onClick={()=>setShowPorConfirmar(false)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',fontSize:18,cursor:'pointer'}}>✕</button>
                </div>
                <div style={{maxHeight:360,overflowY:'auto'}}>
                  {pend.map((v,i)=>(
                    <div key={v.id} style={{padding:'10px 16px',borderBottom:'1px solid #DDE7F2',display:'flex',alignItems:'center',gap:10,background:i%2===0?'#fff':'#FFF9F9'}}>
                      <div style={{width:6,height:6,borderRadius:'50%',background:'#DC3545',flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:11,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.recinto}</div>
                        <div style={{fontSize:10,color:'#5A6A80'}}>{v.areaEje} · {v.region||'Sin región'} · {v.mesPlan}{v.fechaVisita?' ('+v.fechaVisita+')':''}</div>
                      </div>
                      <span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:4,background:'#FCE4E4',color:'#9B1C1C',flexShrink:0}}>{v.fechaVisita?'Fecha vencida':'Mes transcurrido'}</span>
                      <button onClick={()=>{
                        setConfirmId(v.id);
                        setConfirmForm({resultado:'Realizada',fechaVisita:v.fechaVisita||'',mesReal:v.mesReal||v.mesPlan||'',
                          diasTotalReal:v.diasTotalReal||v.diasTotalPlan||0,expertoEncargado:v.expertoEncargado||'',
                          equipoReal:v.equipoReal||'',totalParticipantesReal:v.totalParticipantesReal||0,
                          region:v.region||'',recinto:v.recinto||'',tipoRecinto:v.tipoRecinto||'',
                          tipoVisita:v.tipoVisita||'',areaEje:v.areaEje||'',justificacion:'',nuevaFecha:''});
                        setShowPorConfirmar(false);
                      }} style={{padding:'5px 12px',background:'linear-gradient(135deg,#1E3875,#142E66)',color:'#fff',border:'none',borderRadius:6,fontSize:10,fontWeight:700,cursor:'pointer',flexShrink:0}}>
                        Confirmar →
                      </button>
                    </div>
                  ))}
                </div>
                <div style={{padding:'8px 16px',background:'#F2F6FB',borderTop:'1px solid #DDE7F2',fontSize:9,color:'#5A6A80'}}>
                  Nada se suspende automáticamente — cada visita debe ser confirmada por la SE.
                </div>
              </div>
            );
          })()}

          {/* ══ FORMULARIO DE CONFIRMACIÓN ══ */}
          {confirmId&&(()=>{
            const v=planVisits.find(x=>x.id===confirmId);
            if(!v)return null;
            const isSusp=confirmForm.resultado==='Suspendida';
            const isReprg=confirmForm.resultado==='Reprogramada';
            const inputS={width:'100%',padding:'7px 10px',border:'1px solid #D8E3EF',borderRadius:8,fontSize:12,fontFamily:'Atkinson Hyperlegible Next,sans-serif',color:'#1A2840',background:'#fff'};
            const labelS={display:'block',fontSize:10,fontWeight:700,color:'#5A6A80',marginBottom:3,textTransform:'uppercase'};
            const saveConfirm=async()=>{
              if(!confirmForm.fechaVisita&&!isSusp){showToast('Ingrese fecha real','err');return;}
              if(isReprg&&!confirmForm.nuevaFecha){showToast('Ingrese nueva fecha','err');return;}
              if((isSusp||isReprg)&&!confirmForm.justificacion.trim()){showToast('Ingrese justificación','err');return;}
              const fechaOriginal=v.fechaPlanOriginal||v.fechaVisita||'';
              const fields=isReprg?{
                estado:'Reprogramada',
                fechaVisita:confirmForm.nuevaFecha,
                areaEje:confirmForm.areaEje||'',
                region:confirmForm.region||'',
                recinto:confirmForm.recinto||'',
                tipoVisita:confirmForm.tipoVisita||'',
                tipoRecinto:confirmForm.tipoRecinto||'',
                expertoEncargado:confirmForm.expertoEncargado||'',
                tema:v.tema||'',
              }:{
                // Solo campos que existen en tblPlan — tipos estrictos para Airtable
                estado:confirmForm.resultado,
                areaEje:confirmForm.areaEje||'',
                recinto:confirmForm.recinto||'',
                region:confirmForm.region||'',
                tipoVisita:confirmForm.tipoVisita||'',
                tipoRecinto:confirmForm.tipoRecinto||'',
                expertoEncargado:confirmForm.expertoEncargado||'',
                equipoReal:confirmForm.equipoReal||'',
                fechaVisita:isSusp?v.fechaVisita:confirmForm.fechaVisita,
                mesReal:confirmForm.mesReal||'',
                diasTotalReal:parseFloat(confirmForm.diasTotalReal)||0,
                totalParticipantesReal:parseInt(confirmForm.totalParticipantesReal)||0,
                tema:v.tema||'',
              };
              setSyncingAT(true);
              if(v._recordId){
                const res=await Airtable.update('plan',v._recordId,fields);
                setSyncingAT(false);
                if(res.ok){setPlanVisits(p=>p.map(x=>x.id!==confirmId?x:{...x,...fields,_recordId:v._recordId}));showToast(isReprg?'Visita reprogramada — volverá a Por confirmar cuando venza la nueva fecha':'Visita confirmada como '+confirmForm.resultado);}
                else showToast('Error al guardar: '+res.error,'err');
              }else{
                setSyncingAT(false);
                setPlanVisits(p=>p.map(x=>x.id!==confirmId?x:{...x,...fields}));
                showToast('Guardado localmente','warn');
              }
              setConfirmId(null);setConfirmForm({});
            };
            return(
              <div style={{background:'#fff',borderRadius:12,border:'2px solid #1E3875',marginBottom:16,overflow:'hidden'}}>
                <div style={{background:'linear-gradient(135deg,#0D1F47,#1E3875)',padding:'14px 18px',borderBottom:'3px solid #F0BC5E',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{fontSize:9,fontWeight:700,color:'#F0BC5E',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:3}}>Confirmar visita — {v.id}</div>
                    <div style={{fontSize:14,fontWeight:800,color:'#fff'}}>{v.recinto}</div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.6)',marginTop:2}}>{v.areaEje} · Planificada: {v.mesPlan}{v.fechaVisita?' ('+v.fechaVisita+')':''}{v.fechaPlanOriginal&&v.fechaPlanOriginal!==v.fechaVisita?' — original: '+v.fechaPlanOriginal:''}</div>
                  </div>
                  <button onClick={()=>{setConfirmId(null);setConfirmForm({});}} style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',fontSize:18,cursor:'pointer'}}>✕</button>
                </div>
                <div style={{padding:'16px 18px'}}>
                  <div style={{display:'flex',gap:8,marginBottom:14}}>
                    {['Realizada','Suspendida','Reprogramada'].map(r=>(
                      <button key={r} onClick={()=>setConfirmForm(f=>({...f,resultado:r}))}
                        style={{flex:1,padding:'9px 6px',borderRadius:8,border:`2px solid ${confirmForm.resultado===r?(r==='Realizada'?'#28A05A':r==='Suspendida'?'#DC3545':'#D4941A'):'#D8E3EF'}`,
                          background:confirmForm.resultado===r?(r==='Realizada'?'#D8F5E6':r==='Suspendida'?'#FCE4E4':'#FEF3D8'):'#fff',
                          color:confirmForm.resultado===r?(r==='Realizada'?'#1A7840':r==='Suspendida'?'#9B1C1C':'#8A5A08'):'#5A6A80',
                          fontWeight:700,fontSize:11,cursor:'pointer',fontFamily:'Atkinson Hyperlegible Next,sans-serif'}}>
                        {r==='Realizada'?'✓ Realizada':r==='Suspendida'?'✕ Suspendida':'↻ Reprogramada'}
                      </button>
                    ))}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8,marginBottom:8}}>
                    <div><label style={labelS}>Área/Eje</label><select value={confirmForm.areaEje} onChange={e=>setConfirmForm(f=>({...f,areaEje:e.target.value}))} style={inputS}><option value="">—</option>{CAT.areas.map(a=><option key={a}>{a}</option>)}</select></div>
                    <div><label style={labelS}>Región</label><select value={confirmForm.region} onChange={e=>setConfirmForm(f=>({...f,region:e.target.value}))} style={inputS}><option value="">—</option>{CAT.regiones.map(r=><option key={r}>{r}</option>)}</select></div>
                    <div style={{gridColumn:'span 2'}}><label style={labelS}>Recinto *</label><input value={confirmForm.recinto} onChange={e=>setConfirmForm(f=>({...f,recinto:e.target.value}))} style={inputS}/></div>
                    <div><label style={labelS}>Tipo Recinto</label><select value={confirmForm.tipoRecinto} onChange={e=>setConfirmForm(f=>({...f,tipoRecinto:e.target.value}))} style={inputS}><option value="">—</option>{CAT.tiposRecinto.map(t=><option key={t}>{t}</option>)}</select></div>
                    <div><label style={labelS}>Tipo Visita</label><select value={confirmForm.tipoVisita} onChange={e=>setConfirmForm(f=>({...f,tipoVisita:e.target.value}))} style={inputS}><option value="">—</option>{CAT.tiposVisita.map(t=><option key={t}>{t}</option>)}</select></div>
                    {!isSusp&&<>
                      <div><label style={labelS}>{isReprg?'Nueva fecha *':'Fecha real *'}</label>
                        <input value={isReprg?confirmForm.nuevaFecha:confirmForm.fechaVisita}
                          onChange={e=>setConfirmForm(f=>isReprg?{...f,nuevaFecha:e.target.value}:{...f,fechaVisita:e.target.value})}
                          placeholder="DD/MM/AAAA" style={inputS}/></div>
                      {!isReprg&&<>
                        <div><label style={labelS}>Mes Real</label><select value={confirmForm.mesReal} onChange={e=>setConfirmForm(f=>({...f,mesReal:e.target.value}))} style={inputS}><option value="">—</option>{CAT.meses.map(m=><option key={m}>{m}</option>)}</select></div>
                        <div><label style={labelS}>Días efectivos</label><input type="number" min={0} step={0.5} value={confirmForm.diasTotalReal} onChange={e=>setConfirmForm(f=>({...f,diasTotalReal:e.target.value}))} style={inputS}/></div>
                        <div><label style={labelS}>N° participantes</label><input type="number" min={0} value={confirmForm.totalParticipantesReal} onChange={e=>setConfirmForm(f=>({...f,totalParticipantesReal:e.target.value}))} style={inputS}/></div>
                      </>}
                    </>}
                    {!isReprg&&<>
                      <div><label style={labelS}>Experto/a encargado/a</label><select value={confirmForm.expertoEncargado} onChange={e=>setConfirmForm(f=>({...f,expertoEncargado:e.target.value}))} style={inputS}><option value="">—</option>{CAT.encargados.map(e=><option key={e}>{e}</option>)}</select></div>
                      <div style={{gridColumn:'span 2'}}><label style={labelS}>Equipo que participó</label><input value={confirmForm.equipoReal} onChange={e=>setConfirmForm(f=>({...f,equipoReal:e.target.value}))} placeholder="Nombres separados por coma" style={inputS}/></div>
                    </>}
                    {(isSusp||isReprg)&&<div style={{gridColumn:'1/-1'}}><label style={{...labelS,color:'#9B1C1C'}}>{isSusp?'Motivo suspensión *':'Motivo reprogramación *'}</label>
                      <textarea value={confirmForm.justificacion} onChange={e=>setConfirmForm(f=>({...f,justificacion:e.target.value}))} rows={2} style={{...inputS,borderColor:confirmForm.justificacion?'#D8E3EF':'#DC3545',resize:'vertical'}}/></div>}
                  </div>
                  <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
                    <button onClick={()=>{setConfirmId(null);setConfirmForm({});setShowPorConfirmar(true);}}
                      style={{padding:'7px 14px',background:'#fff',color:'#1A2840',border:'1px solid #D8E3EF',borderRadius:7,fontSize:10,fontWeight:600,cursor:'pointer'}}>← Volver a lista</button>
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={()=>{setConfirmId(null);setConfirmForm({});}}
                        style={{padding:'7px 14px',background:'#fff',color:'#1A2840',border:'1px solid #D8E3EF',borderRadius:7,fontSize:10,fontWeight:600,cursor:'pointer'}}>Cancelar</button>
                      <button onClick={saveConfirm}
                        style={{padding:'7px 20px',background:isSusp?'linear-gradient(135deg,#DC3545,#9B1C1C)':isReprg?'linear-gradient(135deg,#D4941A,#A86E0C)':'linear-gradient(135deg,#28A05A,#1A7840)',
                          color:'#fff',border:'none',borderRadius:7,fontSize:10,fontWeight:700,cursor:'pointer'}}>
                        {isSusp?'Marcar suspendida':isReprg?'Reprogramar →':'Confirmar realizada ✓'}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}<p style={{fontSize:10,color:C.gray,margin:'2px 0 0'}}>Fuente: Planificación_2025.xlsx · {planVisits.length} visitas · Pase el mouse sobre cada indicador para ver su descripción. Haga clic para desglose.</p></div>

          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
            <KpiCard icon={Calendar} label="Visitas Programadas" value={kpis.totalPlan} sub="Total en planificación" accent={C.navy} color={C.navy} kpiKey="planProgramadas" tipKey="planProgramadas"/>
            <KpiCard icon={CheckCircle} label="Prog. Realizadas" value={kpis.planRealizadas} sub={`de ${kpis.totalPlan} planificadas`} accent="#28A05A" color="#1A7840" kpiKey="planRealizadas" tipKey="planRealizadas"/>
            <KpiCard icon={CheckCircle} label="% Fidelidad" value={`${kpis.pctFidelidad}%`} sub={`${kpis.fieles} mismo recinto planificado`} accent="#28A05A" color="#1A7840" kpiKey="fidelidad" tipKey="fidelidad"/>
            <KpiCard icon={AlertTriangle} label="% Variación" value={`${kpis.pctVariacion}%`} sub={`${kpis.conVariacion} con cambios operativos`} accent={C.accent} color={C.badgeText} kpiKey="variacion" tipKey="variacion"/>
            <KpiCard icon={Zap} label="Visitas No Programadas" value={kpis.noPlanRealizadas} sub="No planificadas realizadas" accent="#7C4AC8" color="#5A2EA0" kpiKey="noPlan" tipKey="noPlan"/>

          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div style={{background:'#fff',borderRadius:10,border:`1px solid ${C.grayLight}`,padding:'12px 14px'}}>

              {segResumen.byTR.map((r,i)=>{const mx=Math.max(...segResumen.byTR.map(x=>x.total),1);const isA=histDrill?.type==='tr-seg'&&histDrill.value===r.name;

              {segResumen.byReg.map((r,i)=>{const mx=Math.max(...segResumen.byReg.map(x=>x.total),1);const isA=histDrill?.type==='reg-seg'&&histDrill.value===r.name;
                return <Fragment key={i}><ClickableBarRow item={r} maxVal={mx} color={C.blueDark} isActive={isA} onClick={()=>setHistDrill(isA?null:{type:'reg-seg',value:r.name,visits:r.visits})}/>{isA&&<VisitTable rows={r.visits} title={r.name} showClose onClose={()=>setHistDrill(null)}/>}</Fragment>;})}

          <div style={{background:'#fff',borderRadius:10,border:`1px solid ${C.grayLight}`,padding:'12px 14px',marginBottom:10}}>

            <select value={filterEstado} onChange={e=>setFilterEstado(e.target.value)} style={{...inputStyle,width:'auto',minWidth:90,fontSize:11}}><option value="">Estados</option>{CAT.estados.map(e=><option key={e}>{e}</option>)}</select>

            <div style={{overflowX:'auto',maxHeight:500,overflowY:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
                <thead><tr style={{background:C.cream,borderBottom:`2px solid ${C.creamDark}`}}>
                  {[{k:'id',l:'ID'},{k:'areaEje',l:'Área'},{k:'recinto',l:'Recinto'},{k:'origen',l:'Orig.'},{k:'estado',l:'Estado'},{k:'mesPlan',l:'MesP'},{k:'mesReal',l:'MesR'},{k:'diasTotalPlan',l:'DP'},{k:'diasTotalReal',l:'DR'}].map(c=>(

                      {c.l}<ArrowUpDown size={7} color={sortField===c.k?C.accent:C.grayLight} style={{marginLeft:2,verticalAlign:'middle'}}/>

                  <th style={{padding:'7px 4px',textAlign:'center',fontWeight:700,color:C.gray,fontSize:8,textTransform:'uppercase',position:'sticky',top:0,background:C.cream}}>Acc.</th>
                </tr></thead>
                <tbody>
                  {filteredVisits.slice(0,100).map(v=>{
                    const eff=computeEstadoEfectivo(v);const isE=editingId===v.id;const isX=expandedRow===v.id;

                          <td style={{padding:'6px 4px',fontWeight:700,color:C.blueDark}}>{v.id}</td>
                          <td style={{padding:'6px 4px',maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sc(v.areaEje)}</td>
                          <td style={{padding:'6px 4px',fontWeight:600,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sc(v.recinto)}</td>
                          <td style={{padding:'6px 4px'}}><span style={{fontSize:8,fontWeight:700,padding:'1px 5px',borderRadius:8,background:v.origen==='Planificada'?'#E0ECF8':'#EDE0FA',color:v.origen==='Planificada'?'#1E3875':'#5A2EA0'}}>{v.origen==='Planificada'?'P':'NP'}</span></td>

                          <td style={{padding:'6px 4px',color:C.gray,fontSize:10}}>{sc(v.mesPlan)}</td>
                          <td style={{padding:'6px 4px',fontWeight:dM?700:400,color:dM?'#9B1C1C':C.text,fontSize:10}}>{sc(v.mesReal)}</td>

                          <td style={{padding:'6px 4px',textAlign:'center',fontWeight:dD?700:400,color:dD?'#9B1C1C':C.text}}>{scNum(v.diasTotalReal)}</td>

                            </div>
                          </td>
                        </tr>

                            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8}}>
                              {/* RESULTADO */}
                              <div style={{gridColumn:'1/-1',display:'flex',gap:8,marginBottom:4}}>
                                {['Realizada','Suspendida','Reprogramada'].map(r=>(
                                  <button key={r} onClick={()=>setEditForm(f=>({...f,estado:r}))}
                                    style={{flex:1,padding:'7px 4px',borderRadius:7,border:`2px solid ${editForm.estado===r?(r==='Realizada'?'#28A05A':r==='Suspendida'?'#DC3545':'#D4941A'):'#D8E3EF'}`,

                                      color:editForm.estado===r?(r==='Realizada'?'#1A7840':r==='Suspendida'?'#9B1C1C':'#8A5A08'):'#5A6A80',
                                      fontWeight:700,fontSize:10,cursor:'pointer',fontFamily:'Atkinson Hyperlegible Next,sans-serif'}}>
                                    {r==='Realizada'?'✓ Realizada':r==='Suspendida'?'✕ Suspendida':'↻ Reprogramada'}
                                  </button>
                                ))}
                              </div>
                              {/* CAMPOS PRINCIPALES */}
                              <div><label style={labelStyle}>Área/Eje</label><select value={editForm.areaEje} onChange={e=>setEditForm({...editForm,areaEje:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.areas.map(a=><option key={a}>{a}</option>)}</select></div>
                              <div><label style={labelStyle}>Región</label><select value={editForm.region} onChange={e=>setEditForm({...editForm,region:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.regiones.map(r=><option key={r}>{r}</option>)}</select></div>
                              <div style={{gridColumn:'span 2'}}><label style={labelStyle}>Recinto *</label><input value={editForm.recinto} onChange={e=>setEditForm({...editForm,recinto:e.target.value})} style={inputStyle}/></div>
                              <div><label style={labelStyle}>Tipo Visita</label><select value={editForm.tipoVisita} onChange={e=>setEditForm({...editForm,tipoVisita:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.tiposVisita.map(t=><option key={t}>{t}</option>)}</select></div>
                              <div><label style={labelStyle}>Tipo Recinto</label><select value={editForm.tipoRecinto} onChange={e=>setEditForm({...editForm,tipoRecinto:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.tiposRecinto.map(t=><option key={t}>{t}</option>)}</select></div>
                              {/* EJECUCIÓN */}
                              {editForm.estado!=='Suspendida'&&<>
                                <div><label style={labelStyle}>{editForm.estado==='Reprogramada'?'Nueva fecha planificada':'Fecha real *'}</label>
                                  <input value={editForm.estado==='Reprogramada'?editForm.nuevaFecha:editForm.fechaVisita}
                                    onChange={e=>setEditForm(f=>editForm.estado==='Reprogramada'?{...f,nuevaFecha:e.target.value}:{...f,fechaVisita:e.target.value})}
                                    placeholder="DD/MM/AAAA" style={inputStyle}/></div>
                                {editForm.estado!=='Reprogramada'&&<>
                                  <div><label style={labelStyle}>Mes Real</label><select value={editForm.mesReal} onChange={e=>setEditForm({...editForm,mesReal:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.meses.map(m=><option key={m}>{m}</option>)}</select></div>
                                  <div><label style={labelStyle}>Días Real</label><input type="number" min={0} step={0.5} value={editForm.diasTotalReal} onChange={e=>setEditForm({...editForm,diasTotalReal:e.target.value})} style={inputStyle}/></div>
                                  <div><label style={labelStyle}>N° Participantes</label><input type="number" min={0} value={editForm.totalParticipantesReal} onChange={e=>setEditForm({...editForm,totalParticipantesReal:e.target.value})} style={inputStyle}/></div>
                                </>}
                              </>}
                              {/* EQUIPO */}
                              {editForm.estado!=='Reprogramada'&&<>
                                <div><label style={labelStyle}>Experto/a Encargado/a</label><select value={editForm.expertoEncargado} onChange={e=>setEditForm({...editForm,expertoEncargado:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.encargados.map(e=><option key={e}>{e}</option>)}</select></div>
                                <div><label style={labelStyle}>Analista Encargado/a</label><select value={editForm.analistaEncargado} onChange={e=>setEditForm({...editForm,analistaEncargado:e.target.value})} style={inputStyle}><option value="">—</option>{CAT.analistas.map(a=><option key={a}>{a}</option>)}</select></div>
                                <div style={{gridColumn:'span 2'}}><label style={labelStyle}>Equipo que participó</label><input value={editForm.equipoReal} onChange={e=>setEditForm({...editForm,equipoReal:e.target.value})} placeholder="Nombres separados por coma" style={inputStyle}/></div>
                              </>}

                                <div style={{gridColumn:'1/-1'}}><label style={{...labelStyle,color:'#9B1C1C'}}>{editForm.estado==='Suspendida'?'Motivo suspensión *':'Motivo reprogramación *'}</label>

                              <div style={{gridColumn:'1/-1'}}><label style={labelStyle}>Observaciones</label><textarea value={editForm.observaciones} onChange={e=>setEditForm({...editForm,observaciones:e.target.value})} rows={2} style={{...inputStyle,resize:'vertical'}}/></div>
                            </div>
                            <div style={{display:'flex',gap:5,marginTop:10,justifyContent:'flex-end'}}>
                              <button onClick={cancelEdit} style={{padding:'6px 12px',background:'#fff',color:C.text,border:`1px solid ${C.grayLight}`,borderRadius:7,fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:font}}>Cancelar</button>
                              <button onClick={()=>saveEdit(v.id)} style={{padding:'6px 12px',background:`linear-gradient(135deg,${C.accent},${C.accentDark})`,color:'#fff',border:'none',borderRadius:7,fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:font}}>Guardar</button>
                            </div>
                          </div>
                        </td></tr>}
                      </Fragment>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{padding:'7px 12px',borderTop:`1px solid ${C.creamDark}`,fontSize:9,color:C.gray}}>{filteredVisits.length} visitas{filteredVisits.length>100?' (mostrando 100)':''}</div>

        </div>)}

        {activeTab==='historico'&&(<div>
          <div style={{background:'#fff',borderRadius:10,border:`1px solid ${C.grayLight}`,padding:'9px 16px',marginBottom:12,display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>

              <Filter size={11} color={C.gray}/>

                <option value="">Todos los años</option>
                {histYears.map(y=><option key={y} value={y}>{y}</option>)}
              </select>
              {histYearFilter&&<button onClick={()=>{setHistYearFilter('');setHistDrill(null);}} style={{padding:'4px 8px',border:`1px solid ${C.grayLight}`,borderRadius:6,fontSize:9,fontWeight:700,cursor:'pointer',background:'#fff',color:C.gray,fontFamily:font}}>✕</button>}

          </div>

          <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12}}>
            {[
              {label:'Total Visitas',value:histStats.total,accent:C.navy,icon:Hash,key:'all',visits:histFiltered},
              {label:'Programadas',value:histStats.programadas,accent:'#4172B8',icon:Calendar,key:'prog',visits:histFiltered.filter(v=>v.origen==='Planificada')},
              {label:'No Programadas',value:histStats.noProgramadas,accent:'#7C4AC8',icon:Zap,key:'noprog',visits:histFiltered.filter(v=>v.origen==='No Planificada')},
              {label:'Informes Publicados',value:histStats.informes.length,accent:'#28A05A',icon:FileCheck,key:'informes',visits:histStats.informes},
            ].map(c=>{const isA=histDrill?.type==='stat'&&histDrill.value===c.key;
              return <div key={c.key} onClick={()=>setHistDrill(isA?null:{type:'stat',value:c.key,visits:c.visits})}
                style={{background:isA?'#FFFAF0':'#fff',borderRadius:11,border:`1px solid ${isA?c.accent:C.grayLight}`,padding:'11px 15px',flex:'1 1 140px',minWidth:135,borderTop:`3px solid ${c.accent}`,cursor:'pointer',transition:'all 0.2s',boxShadow:isA?`0 4px 12px ${c.accent}20`:'none'}}>

                <div style={{fontSize:24,fontWeight:800,color:C.text}}>{c.value}</div>
              </div>;

          {histDrill?.type==='stat'&&<VisitTable rows={histDrill.visits} title={histDrill.value==='all'?'Todas las visitas':histDrill.value==='prog'?'Visitas Programadas':histDrill.value==='noprog'?'No Programadas':'Con Informe Publicado'} showClose onClose={()=>setHistDrill(null)}/>}

          {histYearFilter&&<div style={{background:'#fff',borderRadius:10,border:`1px solid ${C.grayLight}`,padding:'12px 14px',marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:C.gray,textTransform:'uppercase',marginBottom:8}}>Visitas por Mes en {histYearFilter} · clic en barra para detalle</div>
            <ResponsiveContainer width="100%" height={140}><BarChart data={histStats.byMes} margin={{top:5,right:10,left:0,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke={C.creamDark}/><XAxis dataKey="short" tick={{fontSize:9,fill:C.gray}}/><YAxis tick={{fontSize:9,fill:C.gray}} allowDecimals={false}/><Tooltip contentStyle={{fontSize:11,fontFamily:font,borderRadius:8}}/><Bar dataKey="total" fill={C.blueDark} radius={[3,3,0,0]} cursor="pointer" onClick={data=>{if(data&&data.total>0){const m=histStats.byMes.find(x=>x.short===data.short);if(m)setHistDrill({type:'h-mes',value:m.name,visits:m.visits});}}}/></BarChart></ResponsiveContainer>
            {histDrill?.type==='h-mes'&&<VisitTable rows={histDrill.visits} title={`Visitas en ${histDrill.value}`} showClose onClose={()=>setHistDrill(null)}/>}
          </div>}

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div style={{background:'#fff',borderRadius:10,border:`1px solid ${C.grayLight}`,padding:'12px 14px'}}>
              <div style={{fontSize:10,fontWeight:700,color:C.gray,textTransform:'uppercase',marginBottom:6}}><Building2 size={10} style={{verticalAlign:'middle',marginRight:4}}/>Por Tipo de Recinto{histYearFilter?` (${histYearFilter})`:''}</div>
              {histStats.byTR.map((r,i)=>{const mx=Math.max(...histStats.byTR.map(x=>x.total),1);const isA=histDrill?.type==='h-tr'&&histDrill.value===r.name;
                return <Fragment key={i}><ClickableBarRow item={r} maxVal={mx} color={C.accent} isActive={isA} onClick={()=>setHistDrill(isA?null:{type:'h-tr',value:r.name,visits:r.visits})}/>{isA&&<VisitTable rows={r.visits} title={r.name} showClose onClose={()=>setHistDrill(null)}/>}</Fragment>;})}
            </div>
            <div style={{background:'#fff',borderRadius:10,border:`1px solid ${C.grayLight}`,padding:'12px 14px'}}>
              <div style={{fontSize:10,fontWeight:700,color:C.gray,textTransform:'uppercase',marginBottom:6}}><Layers size={10} style={{verticalAlign:'middle',marginRight:4}}/>Por Área/Eje{histYearFilter?` (${histYearFilter})`:''}</div>
              {histStats.byArea.map((a,i)=>{const mx=Math.max(...histStats.byArea.map(x=>x.total),1);const isA=histDrill?.type==='h-area'&&histDrill.value===a.name;
                return <Fragment key={i}><ClickableBarRow item={a} maxVal={mx} color={C.blueDark} isActive={isA} onClick={()=>setHistDrill(isA?null:{type:'h-area',value:a.name,visits:a.visits})}/>{isA&&<VisitTable rows={a.visits} title={a.name} showClose onClose={()=>setHistDrill(null)}/>}</Fragment>;})}
            </div>
          </div>

          <div style={{background:'#fff',borderRadius:10,border:`1px solid ${C.grayLight}`,overflow:'hidden'}}>
            <div style={{padding:'9px 14px',background:'#D8F5E6',borderBottom:'2px solid #B8E6CC'}}>
              <span style={{fontSize:10,fontWeight:700,color:'#1A7840'}}>Registro{histYearFilter?` ${histYearFilter}`:' completo'} — {histFiltered.length} visitas</span>
            </div>
            <div style={{overflowX:'auto',maxHeight:400,overflowY:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
                <thead><tr style={{background:'#D8F5E6'}}>
                  {[{l:'ID',k:'id'},{l:'Recinto',k:'recinto'},{l:'Tipo Recinto',k:'tipoRecinto'},{l:'Área',k:'areaEje'},{l:'Origen',k:'origen'},{l:'Región',k:'region'},{l:'Tipo Visita',k:'tipoVisita'},{l:'Mes',k:'mesReal'},{l:'Fecha',k:'fechaVisita'},{l:'Días',k:'diasTotalReal'},{l:'Encargado/a',k:'expertoEncargado'},{l:'Link Informe',k:'link'}].map(c=>(
                    <th key={c.k} onClick={()=>toggleHistSort(c.k)} style={{padding:'6px 5px',textAlign:'left',fontWeight:700,color:'#1A7840',fontSize:8,textTransform:'uppercase',whiteSpace:'nowrap',position:'sticky',top:0,background:'#D8F5E6',borderBottom:'1px solid #B8E6CC',cursor:'pointer',userSelect:'none'}}>
                      {c.l} {histSortField===c.k?(histSortDir==='asc'?'↑':'↓'):<span style={{opacity:0.3}}>↕</span>}
                    </th>
                  ))}
                </tr></thead>
                <tbody>{[...histFiltered].sort((a,b)=>{
                    const f=histSortField,d=histSortDir;
                    let va=a[f],vb=b[f];
                    // Ordenamiento por fecha
                    if(f==='fechaVisita'){
                      const da=parseDateStr(va),db=parseDateStr(vb);
                      if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
                      return d==='asc'?da-db:db-da;
                    }
                    // Ordenamiento por mes
                    if(f==='mesReal'||f==='mesPlan'){
                      const mi={Enero:1,Febrero:2,Marzo:3,Abril:4,Mayo:5,Junio:6,Julio:7,Agosto:8,Septiembre:9,Octubre:10,Noviembre:11,Diciembre:12};
                      const ma=mi[va]||99,mb=mi[vb]||99;
                      return d==='asc'?ma-mb:mb-ma;
                    }
                    // Numérico
                    if(typeof va==='number'&&typeof vb==='number')return d==='asc'?va-vb:vb-va;
                    // Texto
                    va=String(va||'');vb=String(vb||'');
                    return d==='asc'?va.localeCompare(vb):vb.localeCompare(va);
                  }).slice(0,200).map((v,i)=>{
                  const isXh=expandedRow===('hist-'+v.id);
                  return <Fragment key={v.id+i}>
                  <tr onClick={()=>setExpandedRow(isXh?null:('hist-'+v.id))} style={{borderBottom:`1px solid ${C.creamDark}`,background:isXh?'#FEF3D8':(i%2===0?'#fff':'#FAFCFE'),cursor:'pointer'}} onMouseOver={e=>{if(!isXh)e.currentTarget.style.background='#F0F8F4';}} onMouseOut={e=>{if(!isXh)e.currentTarget.style.background=i%2===0?'#fff':'#FAFCFE';}}>
                    <td style={{padding:'6px 5px',fontWeight:700,color:C.blueDark}}>{v.id}</td>
                    <td style={{padding:'6px 5px',fontWeight:600,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sc(v.recinto)}</td>
                    <td style={{padding:'6px 5px',color:C.gray,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sc(v.tipoRecinto)}</td>
                    <td style={{padding:'6px 5px',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sc(v.areaEje)}</td>
                    <td style={{padding:'6px 5px'}}><span style={{fontSize:8,fontWeight:700,padding:'1px 5px',borderRadius:8,background:v.origen==='Planificada'?'#E0ECF8':'#EDE0FA',color:v.origen==='Planificada'?'#1E3875':'#5A2EA0'}}>{sc(v.origen)}</span></td>
                    <td style={{padding:'6px 5px',color:C.gray}}>{sc(v.region)}</td>
                    <td style={{padding:'6px 5px'}}>{sc(v.tipoVisita)}</td>
                    <td style={{padding:'6px 5px',fontWeight:600}}>{sc(v.mesReal||v.mesPlan)}</td>
                    <td style={{padding:'6px 5px'}}>{sc(v.fechaVisita)}</td>
                    <td style={{padding:'6px 5px',textAlign:'center',fontWeight:700}}>{scNum(v.diasTotalReal)}</td>
                    <td style={{padding:'6px 5px'}}>{sc(v.expertoEncargado)}</td>
                    <td style={{padding:'6px 5px'}} onClick={e=>e.stopPropagation()}>
                      <div style={{display:'flex',gap:3,alignItems:'center'}}>
                        {v.link&&<a href={v.link} target="_blank" rel="noopener noreferrer" style={{color:'#2563eb',fontSize:9,fontWeight:600,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:2}}><ExternalLink size={8}/>Ver</a>}
                        {editUnlocked&&<button onClick={()=>{setInformeId('hist-'+v.id);setInformeForm({estadoInforme:v.estadoInforme||'Publicado',fechaPublicacion:v.fechaPublicacion||'',link:v.link||''});}}
                          style={{fontSize:9,fontWeight:700,padding:'2px 5px',borderRadius:3,border:'1px solid #28A05A',background:v.link?'#D8F5E6':'#fff',color:v.link?'#1A7840':'#5A6A80',cursor:'pointer'}}>
                          📄{v.link?'✎':'+ Informe'}
                        </button>}
                        {!v.link&&!editUnlocked&&<span style={{color:C.gray,fontSize:9}}>No publicado</span>}
                      </div>
                    </td>
                  </tr>
                  {informeId===('hist-'+v.id)&&<tr><td colSpan={12} style={{padding:0}}>
                    <div style={{padding:'14px 16px',background:'#F0FFF4',borderTop:'2px solid #28A05A',borderBottom:'2px solid #28A05A',animation:'fadeIn 0.2s'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                        <div>
                          <div style={{fontSize:9,fontWeight:700,color:'#1A7840',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:2}}>📄 Registrar informe publicado</div>
                          <div style={{fontSize:12,fontWeight:700,color:'#1A2840'}}>{v.recinto} · {v.areaEje}</div>
                          <div style={{fontSize:10,color:'#5A6A80'}}>Este registro es independiente de los datos de la visita</div>
                        </div>
                        <button onClick={()=>{setInformeId(null);setInformeForm({estadoInforme:'Publicado',fechaPublicacion:'',link:''});}} style={{background:'none',border:'none',color:'#5A6A80',fontSize:16,cursor:'pointer'}}>✕</button>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:8,marginBottom:10}}>
                        <div><label style={{display:'block',fontSize:10,fontWeight:700,color:'#5A6A80',marginBottom:3,textTransform:'uppercase'}}>Estado del informe</label>
                          <select value={informeForm.estadoInforme} onChange={e=>setInformeForm(f=>({...f,estadoInforme:e.target.value}))}
                            style={{width:'100%',padding:'7px 10px',border:'1px solid #D8E3EF',borderRadius:8,fontSize:12,fontFamily:'Atkinson Hyperlegible Next,sans-serif',color:'#1A2840',background:'#fff'}}>
                            <option value="Publicado">Publicado</option>
                            <option value="En elaboración">En elaboración</option>
                            <option value="En revisión">En revisión</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="No aplica">No aplica</option>
                          </select></div>
                        <div><label style={{display:'block',fontSize:10,fontWeight:700,color:'#5A6A80',marginBottom:3,textTransform:'uppercase'}}>Fecha de publicación</label>
                          <input value={informeForm.fechaPublicacion} onChange={e=>setInformeForm(f=>({...f,fechaPublicacion:e.target.value}))}
                            placeholder="DD/MM/AAAA" style={{width:'100%',padding:'7px 10px',border:'1px solid #D8E3EF',borderRadius:8,fontSize:12,fontFamily:'Atkinson Hyperlegible Next,sans-serif',color:'#1A2840',background:'#fff'}}/></div>
                        <div style={{gridColumn:'span 2'}}><label style={{display:'block',fontSize:10,fontWeight:700,color:'#5A6A80',marginBottom:3,textTransform:'uppercase'}}>Link al informe publicado (mnpt.cl) *</label>
                          <input value={informeForm.link} onChange={e=>setInformeForm(f=>({...f,link:e.target.value}))}
                            placeholder="https://mnpt.cl/wp-content/uploads/..." style={{width:'100%',padding:'7px 10px',border:`1px solid ${informeForm.link?'#D8E3EF':'#DC3545'}`,borderRadius:8,fontSize:12,fontFamily:'Atkinson Hyperlegible Next,sans-serif',color:'#1A2840',background:'#fff'}}/></div>
                      </div>
                      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                        <button onClick={()=>{setInformeId(null);setInformeForm({estadoInforme:'Publicado',fechaPublicacion:'',link:''});}}
                          style={{padding:'7px 14px',background:'#fff',color:'#1A2840',border:'1px solid #D8E3EF',borderRadius:7,fontSize:10,fontWeight:600,cursor:'pointer'}}>Cancelar</button>
                        <button onClick={()=>saveInforme(v.id,v._recordId)}
                          style={{padding:'7px 16px',background:'linear-gradient(135deg,#28A05A,#1A7840)',color:'#fff',border:'none',borderRadius:7,fontSize:10,fontWeight:700,cursor:'pointer'}}>
                          Guardar informe ✓
                        </button>
                      </div>
                    </div>
                  </td></tr>}
                  {isXh&&<VisitDetailPanel v={v} onClose={()=>setExpandedRow(null)} accentColor={C.accent}/>}
                  </Fragment>;
                })}</tbody>
              </table>
            </div>
          </div>
        </div>)}
      </main>

      <footer style={{textAlign:'center',padding:'12px 18px',fontSize:9,color:C.gray,borderTop:`1px solid ${C.creamDark}`,marginTop:12}}>Comité para la Prevención de la Tortura — Chile · Plataforma de Monitoreo Institucional · Fuentes: Matriz Consolidada de Visitas + Planificación 2025</footer>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}*{box-sizing:border-box}input:focus,select:focus,textarea:focus{outline:none;border-color:${C.accent}!important;box-shadow:0 0 0 3px ${C.accent}25}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:${C.cream}}::-webkit-scrollbar-thumb{background:${C.grayLight};border-radius:3px}`}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

</script>

</body>
</html>
